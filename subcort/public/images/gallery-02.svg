<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16271d"/>
      <stop offset="45%" stop-color="#274635"/>
      <stop offset="74%" stop-color="#7a6e4e"/>
      <stop offset="82%" stop-color="#3a5b44"/>
      <stop offset="100%" stop-color="#223024"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="64%" r="46%">
      <stop offset="0%" stop-color="#f0b985" stop-opacity="0.62"/>
      <stop offset="50%" stop-color="#d2864f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d2864f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="guyline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6fa178"/>
      <stop offset="100%" stop-color="#f0b985"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="750" fill="url(#dusk)"/>
  <rect width="1000" height="750" fill="url(#lamp)"/>
  
  <line x1="0" y1="615" x2="1000" y2="615" stroke="#5d7a64" stroke-width="2" opacity="0.4"/>
  <!-- frame -->
  <g stroke="#6fa178" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round">
    <line x1="190" y1="615" x2="190" y2="457.5"/>
    <line x1="810" y1="615" x2="810" y2="457.5"/>
    <line x1="500" y1="615" x2="500" y2="300"/>
    <line x1="190" y1="457.5" x2="500" y2="300"/>
    <line x1="810" y1="457.5" x2="500" y2="300"/>
  </g>
  <!-- canvas being pulled over one side -->
  <path d="M190,457.5 L500,300 L500,615 L190,615 Z" fill="#f3f4ec" opacity="0.9"/>
  <line x1="190" y1="457.5" x2="160" y2="615" stroke="#d2864f" stroke-width="2" opacity="0.7"/>
  <rect x="0" y="0" width="1000" height="5" fill="url(#guyline)"/>
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="50%" y="717" text-anchor="middle" font-size="30" font-weight="700" fill="#f6f4ea" opacity="0.9">Montaj la fața locului</text>
  </g>
</svg>