<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2f23"/>
      <stop offset="60%" stop-color="#26412f"/>
      <stop offset="100%" stop-color="#2c3a2c"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="62%" r="42%">
      <stop offset="0%" stop-color="#e6a877" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#c87b4a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c87b4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="guyline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a8c63"/>
      <stop offset="100%" stop-color="#e6a877"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="750" fill="url(#dusk)"/>
  <rect width="1000" height="750" fill="url(#lamp)"/>
  
  <line x1="0" y1="615" x2="1000" y2="615" stroke="#46604f" stroke-width="2" opacity="0.4"/>
  <!-- frame -->
  <g stroke="#5a8c63" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round">
    <line x1="190" y1="615" x2="190" y2="457.5"/>
    <line x1="810" y1="615" x2="810" y2="457.5"/>
    <line x1="500" y1="615" x2="500" y2="300"/>
    <line x1="190" y1="457.5" x2="500" y2="300"/>
    <line x1="810" y1="457.5" x2="500" y2="300"/>
  </g>
  <!-- canvas being pulled over one side -->
  <path d="M190,457.5 L500,300 L500,615 L190,615 Z" fill="#eef0e8" opacity="0.9"/>
  <line x1="190" y1="457.5" x2="160" y2="615" stroke="#c87b4a" stroke-width="2" opacity="0.7"/>
  <rect x="0" y="0" width="1000" height="5" fill="url(#guyline)"/>
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="50%" y="717" text-anchor="middle" font-size="30" font-weight="700" fill="#f3f1e8" opacity="0.9">Detaliu de structură</text>
  </g>
</svg>